<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AurumPulse Pro | Market Correlation Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root { --gold: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --blue-accent: #1e3a8a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .dashboard { max-width: 1100px; margin: auto; padding-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        
        /* Mavi Bant Analiz Kutusu */
        #marketNote { 
            grid-column: span 3; 
            background: var(--blue-accent); 
            color: #bfdbfe; 
            font-style: italic; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px;
            border-left: 5px solid var(--gold);
            font-size: 16px;
        }

        .price-val { font-size: 32px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .label { color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        #chart { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #334155; min-height: 450px; }
        h1 { margin-bottom: 30px; border-left: 4px solid var(--gold); padding-left: 15px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>🚀 AurumPulse <span style="font-size: 16px; color: #64748b; font-weight: normal;">v2.0 Professional</span></h1>
    
    <div class="grid">
        <div class="card">
            <div class="label">Ons Altın (XAU)</div>
            <div id="goldPrice" class="price-val">--</div>
            <small>RSI (14): <span id="goldRsi" style="color:#fbbf24">--</span></small>
        </div>
        
        <div class="card">
            <div class="label">Dolar Endeksi (DXY)</div>
            <div id="dxyPrice" class="price-val" style="color: #60a5fa;">--</div>
            <small>ABD Doları Gücü</small>
        </div>
        
        <div class="card">
            <div class="label">Sinyal Durumu</div>
            <div id="signal" class="price-val" style="font-size: 22px;">Analiz Ediliyor...</div>
            <small>Veritabanı Kaydı: <span id="dbCount" style="font-weight:bold">0</span></small>
        </div>

        <div id="marketNote">Piyasa verileri analiz ediliyor, lütfen bekleyin...</div>
    </div>

    <div id="chart"></div>
</div>

<script>
    let chart;

    async function updateData() {
        try {
            const res = await fetch('http://127.0.0.1:5000/api/market_data');
            if (!res.ok) throw new Error("Backend hatası!");
            const data = await res.json();

            // Metin Alanları
            document.getElementById('goldPrice').innerText = '$' + data.gold_price;
            document.getElementById('goldRsi').innerText = data.gold_rsi;
            document.getElementById('dxyPrice').innerText = data.dxy_price;
            document.getElementById('dbCount').innerText = data.history_count;
            
            // MAVİ BANTI GÜNCELLEME (En sağlam yöntem)
            const noteElement = document.getElementById('marketNote');
            if (data.market_note) {
                noteElement.innerText = data.market_note;
                console.log("Not başarıyla güncellendi: ", data.market_note);
            } else {
                noteElement.innerText = "Şu an analiz verisi alınamıyor.";
            }

            // Sinyal Renklendirmesi
            let signalText = "NÖTR";
            let signalColor = "#fbbf24"; 
            if (data.gold_rsi < 35) { signalText = "GÜÇLÜ AL"; signalColor = "#4ade80"; } 
            else if (data.gold_rsi > 65) { signalText = "GÜÇLÜ SAT"; signalColor = "#f87171"; }
            
            const sigEl = document.getElementById('signal');
            sigEl.innerText = signalText;
            sigEl.style.color = signalColor;

            // Grafik Güncellemesi
            if (!chart) {
                chart = new ApexCharts(document.querySelector("#chart"), {
                    series: [{ name: 'Altın', type: 'candlestick', data: data.candles }],
                    chart: { type: 'candlestick', height: 400, background: 'transparent', toolbar: { show: true } },
                    xaxis: { type: 'datetime' },
                    theme: { mode: 'dark' },
                    plotOptions: { candlestick: { colors: { upward: '#4ade80', downward: '#f87171' } } }
                });
                chart.render();
            } else {
                chart.updateSeries([{ data: data.candles }]);
            }
        } catch (e) {
            console.error("Hata:", e);
            document.getElementById('marketNote').innerText = "❌ Hata: Python sunucusuna ulaşılamıyor.";
            document.getElementById('marketNote').style.background = "#7f1d1d"; 
        }
    }

    updateData();
    setInterval(updateData, 30000);
</script>

</body>
</html>
