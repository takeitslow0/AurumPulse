<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AurumPulse Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#D4A843;--green:#22C55E;--red:#EF4444;
      --bg:#0a0b0e;--bg2:#12141a;--bg3:#1a1d25;
      --border:#1e2130;--text:#e8ecf1;--text2:#8892a4;
      --font:'JetBrains Mono',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

    .app{display:flex;flex-direction:column;height:100vh;padding:16px;gap:12px}

    /* ── TOP BAR ── */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:10px}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .logo{color:var(--gold);font-weight:700;font-size:18px}
    .pair{font-size:13px;color:var(--text2)}
    .nav-links{display:flex;gap:12px}
    .nav-links a{color:var(--text2);text-decoration:none;font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);transition:all .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold);border-color:var(--gold)}

    /* ── PRICE SECTION ── */
    .price-section{display:flex;align-items:center;gap:24px;padding:20px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:10px}
    .price-main{font-size:48px;font-weight:700;letter-spacing:-1px;transition:color .3s}
    .price-up{color:var(--green)}
    .price-down{color:var(--red)}
    .price-neutral{color:var(--text)}
    .price-change{font-size:16px;padding:4px 10px;border-radius:6px;font-weight:600}
    .change-pos{color:var(--green);background:rgba(34,197,94,0.1)}
    .change-neg{color:var(--red);background:rgba(239,68,68,0.1)}
    .price-meta{font-size:11px;color:var(--text2);display:flex;flex-direction:column;gap:2px}
    .live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ── MAIN GRID ── */
    .main-grid{display:grid;grid-template-columns:1fr 340px;gap:12px;flex:1;min-height:0}

    /* ── ORDERS TABLE ── */
    .panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;overflow:auto}
    .panel-title{font-size:13px;font-weight:600;color:var(--gold);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{color:var(--text2);font-weight:500;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
    td{padding:8px;border-bottom:1px solid rgba(30,33,48,0.5)}
    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
    .tag-long{color:var(--green);background:rgba(34,197,94,0.12)}
    .tag-short{color:var(--red);background:rgba(239,68,68,0.12)}
    .pnl-pos{color:var(--green);font-weight:600}
    .pnl-neg{color:var(--red);font-weight:600}

    /* ── RIGHT SIDEBAR ── */
    .sidebar-right{display:flex;flex-direction:column;gap:12px}

    /* ── DAILY TARGET ── */
    .target-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
    .target-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .target-label{font-size:13px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
    .target-amount{font-size:28px;font-weight:700}
    .target-sub{font-size:12px;color:var(--text2);margin-top:4px}
    .progress-bar{width:100%;height:8px;background:var(--bg3);border-radius:4px;margin-top:12px;overflow:hidden}
    .progress-fill{height:100%;border-radius:4px;transition:width .5s;background:linear-gradient(90deg,var(--gold),var(--green))}
    .target-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .stat-item{background:var(--bg3);padding:8px;border-radius:6px;text-align:center}
    .stat-val{font-size:16px;font-weight:600}
    .stat-label{font-size:10px;color:var(--text2);margin-top:2px}

    /* ── CLOSED TRADES ── */
    .closed-list{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto}
    .closed-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg3);border-radius:6px;font-size:12px}
    .closed-item .type{font-weight:600}
    .closed-item .result{font-weight:600}

    /* ── EMPTY STATE ── */
    .empty{text-align:center;padding:40px;color:var(--text2);font-size:13px}

    /* Scrollbar */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>
  <div class="app">
    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <span class="logo">Au</span>
        <span class="pair">XAU / USD</span>
        <span class="live-dot"></span>
      </div>
      <div class="nav-links">
        <a href="/" class="active">Gold</a>
        <a href="/crypto">Kripto</a>
      </div>
    </div>

    <!-- PRICE -->
    <div class="price-section">
      <div id="price" class="price-main price-neutral">--</div>
      <div id="priceChange" class="price-change">--</div>
      <div class="price-meta">
        <span id="priceSource">Kaynak: --</span>
        <span id="priceTime">Son güncelleme: --</span>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
      <!-- LEFT: ORDERS -->
      <div class="panel">
        <div class="panel-title">Açık Pozisyonlar</div>
        <table>
          <thead>
            <tr>
              <th>Tip</th>
              <th>Giriş</th>
              <th>SL</th>
              <th>TP1</th>
              <th>TP2</th>
              <th>Lot</th>
              <th>P/L</th>
            </tr>
          </thead>
          <tbody id="positionsBody">
            <tr><td colspan="7" class="empty">Sinyal bekleniyor...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- RIGHT: TARGET + CLOSED -->
      <div class="sidebar-right">
        <!-- DAILY TARGET -->
        <div class="target-box">
          <div class="target-header">
            <span class="target-label">Günlük Hedef</span>
            <span style="font-size:13px;color:var(--text2)">$300</span>
          </div>
          <div id="dailyTotal" class="target-amount pnl-pos">$0.00</div>
          <div id="dailySub" class="target-sub">0 işlem tamamlandı</div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill" style="width:0%"></div>
          </div>
          <div class="target-stats">
            <div class="stat-item">
              <div id="realizedPnl" class="stat-val pnl-pos">$0.00</div>
              <div class="stat-label">Gerçekleşen</div>
            </div>
            <div class="stat-item">
              <div id="unrealizedPnl" class="stat-val">$0.00</div>
              <div class="stat-label">Açık P/L</div>
            </div>
          </div>
        </div>

        <!-- CLOSED TRADES TODAY -->
        <div class="panel" style="flex:1">
          <div class="panel-title">Bugünkü İşlemler</div>
          <div id="closedTrades" class="closed-list">
            <div class="empty">Henüz kapanan işlem yok</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const socket = io(API, {transports: ['websocket', 'polling']});

    let lastPrice = 0;
    let sessionHigh = 0;
    let sessionLow = Infinity;

    // ── SOCKET: PRICE TICK (her 2 saniye) ──
    socket.on('price_tick', (data) => {
      updatePrice(data.price, data.change, data.source);
      if (data.positions) updatePositions(data.positions);
      if (data.daily_pnl) updateDailyPnl(data.daily_pnl);
    });

    // ── SOCKET: MARKET UPDATE (scanner, 55sn) ──
    socket.on('market_update', (data) => {
      // Scanner güncellemesi geldiğinde de yansıt
      if (data.gold_price > 0) {
        updatePrice(data.gold_price, 0, 'scanner');
      }
    });

    socket.on('connect', () => {
      document.getElementById('priceSource').textContent = 'Bağlandı ✓';
      // İlk veriyi çek
      fetchInitialData();
    });

    socket.on('disconnect', () => {
      document.getElementById('priceSource').textContent = 'Bağlantı kesildi...';
    });

    function updatePrice(price, change, source) {
      if (!price || price <= 0) return;

      const el = document.getElementById('price');
      const changeEl = document.getElementById('priceChange');

      // Fiyat rengi
      if (lastPrice > 0) {
        el.className = 'price-main ' + (price > lastPrice ? 'price-up' : price < lastPrice ? 'price-down' : 'price-neutral');
      }
      el.textContent = '$' + price.toFixed(2);

      // Değişim
      if (change && change !== 0) {
        const sign = change > 0 ? '+' : '';
        changeEl.textContent = sign + change.toFixed(2);
        changeEl.className = 'price-change ' + (change > 0 ? 'change-pos' : 'change-neg');
      }

      // Meta
      document.getElementById('priceSource').textContent = 'Kaynak: ' + (source || '--');
      document.getElementById('priceTime').textContent = new Date().toLocaleTimeString('tr-TR');

      lastPrice = price;
    }

    function updatePositions(positions) {
      const tbody = document.getElementById('positionsBody');
      if (!positions || positions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">Sinyal bekleniyor...</td></tr>';
        return;
      }
      tbody.innerHTML = positions.map(p => `
        <tr>
          <td><span class="tag ${p.type === 'LONG' ? 'tag-long' : 'tag-short'}">${p.type}</span></td>
          <td>$${p.entry.toFixed(2)}</td>
          <td style="color:var(--red)">$${p.sl.toFixed(2)}</td>
          <td style="color:var(--green)">$${p.tp1.toFixed(2)}</td>
          <td style="color:var(--green)">$${p.tp2.toFixed(2)}</td>
          <td>${p.lot}</td>
          <td class="${p.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${p.pnl >= 0 ? '+' : ''}$${p.pnl.toFixed(2)}</td>
        </tr>
      `).join('');
    }

    function updateDailyPnl(pnl) {
      const totalEl = document.getElementById('dailyTotal');
      totalEl.textContent = (pnl.total >= 0 ? '+' : '') + '$' + pnl.total.toFixed(2);
      totalEl.className = 'target-amount ' + (pnl.total >= 0 ? 'pnl-pos' : 'pnl-neg');

      document.getElementById('dailySub').textContent = pnl.closed_trades + ' işlem tamamlandı';
      document.getElementById('progressFill').style.width = Math.max(0, pnl.progress_pct) + '%';

      const realEl = document.getElementById('realizedPnl');
      realEl.textContent = (pnl.realized >= 0 ? '+' : '') + '$' + pnl.realized.toFixed(2);
      realEl.className = 'stat-val ' + (pnl.realized >= 0 ? 'pnl-pos' : 'pnl-neg');

      const unrEl = document.getElementById('unrealizedPnl');
      unrEl.textContent = (pnl.unrealized >= 0 ? '+' : '') + '$' + pnl.unrealized.toFixed(2);
      unrEl.className = 'stat-val ' + (pnl.unrealized >= 0 ? 'pnl-pos' : 'pnl-neg');
    }

    async function fetchInitialData() {
      try {
        // Market data (scanner'dan gelen son veri)
        const res = await fetch(API + '/api/market_data?interval=1min');
        const data = await res.json();
        if (data.gold_price > 0) {
          updatePrice(data.gold_price, 0, 'init');
        }
        // Pozisyonlar
        if (data.active_positions) {
          const price = data.gold_price || 0;
          const positions = data.active_positions.map(p => ({
            type: p.trend === 'bullish' ? 'LONG' : 'SHORT',
            entry: p.entry,
            sl: p.sl,
            tp1: p.tp1,
            tp2: p.tp2 || p.tp1,
            lot: p.lot || 0.01,
            pnl: p.trend === 'bullish'
              ? (price - p.entry) * (p.lot || 0.01) * 100
              : (p.entry - price) * (p.lot || 0.01) * 100,
          }));
          updatePositions(positions);
        }
      } catch(e) { console.error('Init fetch error:', e); }

      try {
        const res2 = await fetch(API + '/api/daily_pnl');
        const pnl = await res2.json();
        updateDailyPnl(pnl);
      } catch(e) { console.error('PnL fetch error:', e); }

      try {
        const res3 = await fetch(API + '/api/closed_today');
        const data3 = await res3.json();
        updateClosedTrades(data3.trades || []);
      } catch(e) { console.error('Closed trades error:', e); }
    }

    function updateClosedTrades(trades) {
      const el = document.getElementById('closedTrades');
      if (!trades || trades.length === 0) {
        el.innerHTML = '<div class="empty">Henüz kapanan işlem yok</div>';
        return;
      }
      el.innerHTML = trades.map(t => {
        const isProfit = t.pnl >= 0;
        const time = t.close_time ? new Date(t.close_time * 1000).toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'}) : '--';
        return `
          <div class="closed-item">
            <span class="type" style="color:${t.trend === 'bullish' ? 'var(--green)' : 'var(--red)'}">${t.trend === 'bullish' ? 'LONG' : 'SHORT'}</span>
            <span style="color:var(--text2)">${time}</span>
            <span style="color:var(--text2)">${t.result}</span>
            <span class="result ${isProfit ? 'pnl-pos' : 'pnl-neg'}">${isProfit ? '+' : ''}$${t.pnl.toFixed(2)}</span>
          </div>
        `;
      }).join('');
    }

    // Her 30 saniyede closed trades güncelle
    setInterval(async () => {
      try {
        const res = await fetch(API + '/api/closed_today');
        const data = await res.json();
        updateClosedTrades(data.trades || []);
      } catch(e) {}
    }, 30000);
  </script>
</body>
</html>
