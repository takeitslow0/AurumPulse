<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AurumPulse — Kripto Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#D4A843;--green:#22C55E;--red:#EF4444;--blue:#3B82F6;
      --bg:#0a0b0e;--bg2:#12141a;--bg3:#1a1d25;
      --border:#1e2130;--text:#e8ecf1;--text2:#8892a4;
      --font:'JetBrains Mono',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}

    .app{display:flex;flex-direction:column;height:100vh;padding:16px;gap:12px}

    /* TOP BAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:10px}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .logo{color:var(--blue);font-weight:700;font-size:18px}
    .pair{font-size:13px;color:var(--text2)}
    .nav-links{display:flex;gap:12px}
    .nav-links a{color:var(--text2);text-decoration:none;font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);transition:all .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--blue);border-color:var(--blue)}

    /* COIN CARDS */
    .coins-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .coin-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s}
    .coin-card:hover,.coin-card.active{border-color:var(--blue)}
    .coin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .coin-name{font-size:14px;font-weight:600}
    .coin-icon{font-size:20px}
    .coin-price{font-size:24px;font-weight:700;margin-bottom:4px}
    .coin-change{font-size:12px;font-weight:600}

    /* MAIN GRID */
    .main-grid{display:grid;grid-template-columns:1fr 340px;gap:12px;flex:1;min-height:0}

    /* PANEL */
    .panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;overflow:auto}
    .panel-title{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{color:var(--text2);font-weight:500;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
    td{padding:8px;border-bottom:1px solid rgba(30,33,48,0.5)}
    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
    .tag-long{color:var(--green);background:rgba(34,197,94,0.12)}
    .tag-short{color:var(--red);background:rgba(239,68,68,0.12)}
    .pnl-pos{color:var(--green);font-weight:600}
    .pnl-neg{color:var(--red);font-weight:600}

    .sidebar-right{display:flex;flex-direction:column;gap:12px}
    .stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
    .stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
    .stat-val{font-size:22px;font-weight:700}

    .empty{text-align:center;padding:40px;color:var(--text2);font-size:13px}
    .live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    .closed-list{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto}
    .closed-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg3);border-radius:6px;font-size:12px}

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>
  <div class="app">
    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <span class="logo">Kripto</span>
        <span class="pair">BTC / ETH / SOL / XRP</span>
        <span class="live-dot"></span>
      </div>
      <div class="nav-links">
        <a href="/">Gold</a>
        <a href="/crypto" class="active">Kripto</a>
      </div>
    </div>

    <!-- COIN CARDS -->
    <div class="coins-grid">
      <div class="coin-card active" data-symbol="BTCUSDT">
        <div class="coin-header">
          <span class="coin-name">Bitcoin</span>
          <span class="coin-icon">&#8383;</span>
        </div>
        <div class="coin-price" id="price-BTCUSDT">--</div>
        <div class="coin-change" id="signal-BTCUSDT">--</div>
      </div>
      <div class="coin-card" data-symbol="ETHUSDT">
        <div class="coin-header">
          <span class="coin-name">Ethereum</span>
          <span class="coin-icon">&Xi;</span>
        </div>
        <div class="coin-price" id="price-ETHUSDT">--</div>
        <div class="coin-change" id="signal-ETHUSDT">--</div>
      </div>
      <div class="coin-card" data-symbol="SOLUSDT">
        <div class="coin-header">
          <span class="coin-name">Solana</span>
          <span class="coin-icon">&#9678;</span>
        </div>
        <div class="coin-price" id="price-SOLUSDT">--</div>
        <div class="coin-change" id="signal-SOLUSDT">--</div>
      </div>
      <div class="coin-card" data-symbol="XRPUSDT">
        <div class="coin-header">
          <span class="coin-name">XRP</span>
          <span class="coin-icon">&#10005;</span>
        </div>
        <div class="coin-price" id="price-XRPUSDT">--</div>
        <div class="coin-change" id="signal-XRPUSDT">--</div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
      <div class="panel">
        <div class="panel-title">Kripto Pozisyonlar</div>
        <table>
          <thead>
            <tr>
              <th>Coin</th>
              <th>Tip</th>
              <th>Giris</th>
              <th>SL</th>
              <th>TP</th>
              <th>P/L</th>
            </tr>
          </thead>
          <tbody id="cryptoPositions">
            <tr><td colspan="6" class="empty">Sinyal bekleniyor...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="sidebar-right">
        <div class="stat-box">
          <div class="stat-label">Kripto Bakiye</div>
          <div id="cryptoBalance" class="stat-val">$1,000.00</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Toplam P/L</div>
          <div id="cryptoPnl" class="stat-val pnl-pos">$0.00</div>
        </div>
        <div class="panel" style="flex:1">
          <div class="panel-title">Son Islemler</div>
          <div id="cryptoTrades" class="closed-list">
            <div class="empty">Henuz islem yok</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const socket = io(API, {transports: ['websocket', 'polling']});

    // Coin cards click
    document.querySelectorAll('.coin-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
    });

    // Fetch crypto data
    async function fetchCryptoData() {
      try {
        const res = await fetch(API + '/api/crypto/market_data');
        const data = await res.json();

        for (const [symbol, info] of Object.entries(data)) {
          const priceEl = document.getElementById('price-' + symbol);
          const sigEl = document.getElementById('signal-' + symbol);
          if (priceEl && info.price) {
            priceEl.textContent = '$' + Number(info.price).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            priceEl.style.color = info.change_24h >= 0 ? 'var(--green)' : 'var(--red)';
          }
          if (sigEl && info.signal) {
            sigEl.textContent = info.signal.trend || '--';
            sigEl.style.color = info.signal.trend === 'bullish' ? 'var(--green)' : info.signal.trend === 'bearish' ? 'var(--red)' : 'var(--text2)';
          }
        }
      } catch(e) { console.error('Crypto fetch error:', e); }

      try {
        const res2 = await fetch(API + '/api/crypto/trades');
        const data2 = await res2.json();
        document.getElementById('cryptoBalance').textContent = '$' + (data2.balance || 1000).toFixed(2);

        const totalPnl = (data2.trades || []).reduce((sum, t) => sum + (t.pnl || 0), 0);
        const pnlEl = document.getElementById('cryptoPnl');
        pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + '$' + totalPnl.toFixed(2);
        pnlEl.className = 'stat-val ' + (totalPnl >= 0 ? 'pnl-pos' : 'pnl-neg');

        const tradesEl = document.getElementById('cryptoTrades');
        const trades = (data2.trades || []).slice(-10).reverse();
        if (trades.length === 0) {
          tradesEl.innerHTML = '<div class="empty">Henuz islem yok</div>';
        } else {
          tradesEl.innerHTML = trades.map(t => `
            <div class="closed-item">
              <span style="font-weight:600">${t.symbol || '--'}</span>
              <span style="color:${t.trend === 'bullish' ? 'var(--green)' : 'var(--red)'}">${t.trend === 'bullish' ? 'LONG' : 'SHORT'}</span>
              <span class="${(t.pnl||0) >= 0 ? 'pnl-pos' : 'pnl-neg'}">${(t.pnl||0) >= 0 ? '+' : ''}$${(t.pnl||0).toFixed(2)}</span>
            </div>
          `).join('');
        }
      } catch(e) {}
    }

    // Crypto positions
    socket.on('crypto_update', (data) => {
      if (data && data.positions) {
        const tbody = document.getElementById('cryptoPositions');
        const positions = Object.values(data.positions);
        if (positions.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">Sinyal bekleniyor...</td></tr>';
        } else {
          tbody.innerHTML = positions.map(p => `
            <tr>
              <td style="font-weight:600">${p.symbol || '--'}</td>
              <td><span class="tag ${p.trend === 'bullish' ? 'tag-long' : 'tag-short'}">${p.trend === 'bullish' ? 'LONG' : 'SHORT'}</span></td>
              <td>$${(p.entry||0).toFixed(2)}</td>
              <td style="color:var(--red)">$${(p.sl||0).toFixed(2)}</td>
              <td style="color:var(--green)">$${(p.tp||0).toFixed(2)}</td>
              <td class="${(p.pnl||0) >= 0 ? 'pnl-pos' : 'pnl-neg'}">${(p.pnl||0) >= 0 ? '+' : ''}$${(p.pnl||0).toFixed(2)}</td>
            </tr>
          `).join('');
        }
      }
    });

    // İlk yükleme
    fetchCryptoData();
    // 30 saniyede bir güncelle
    setInterval(fetchCryptoData, 30000);
  </script>
</body>
</html>
